<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradersMate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="mode-gate" id="modeGate">
      <p class="eyebrow">Star Citizen</p>
      <h1>TradersMate</h1>
      <div class="mode-actions">
        <button type="button" class="mode-button" data-mode="trading">Trading</button>
        <button type="button" class="mode-button" data-mode="shopping">Shopping</button>
      </div>
    </section>

    <section class="hero">
      <div>
        <p class="eyebrow" id="modeEyebrow">Star Citizen Trading</p>
        <h1>TradersMate</h1>
      </div>
      <button type="button" class="mode-reset" id="modeReset">Wechseln</button>
      <div class="risk-switch" id="riskSwitch" aria-label="Risiko-Stufe">
        <button type="button" class="risk-button is-active" data-risk="low">Low</button>
        <button type="button" class="risk-button" data-risk="medium">Medium</button>
        <button type="button" class="risk-button" data-risk="high">High</button>
      </div>
    </section>

    <section class="control-panel" id="tradingControls">
      <label>
        <span>Startstation</span>
        <select id="stationSelect">
          <option value="">Station waehlen</option>
        </select>
      </label>

      <label>
        <span>Material</span>
        <select id="materialSelect">
          <option value="">Material waehlen</option>
        </select>
      </label>

      <label>
        <span>Auto-Load Kosten / SCU</span>
        <input id="autoLoadCostInput" type="number" min="0" step="1" value="0">
      </label>
    </section>

    <section class="control-panel is-hidden" id="shoppingControls">
      <label>
        <span>Item suchen</span>
        <input id="shoppingSearch" type="search" placeholder="Name, Kategorie oder Hersteller">
      </label>

      <label>
        <span>Kategorie</span>
        <select id="shoppingCategory">
          <option value="">Alle Kategorien</option>
        </select>
      </label>
    </section>

    <section class="summary" id="summary">
      Waehle eine Startstation und ein Material.
    </section>

    <section class="results-wrap" id="tradingResults">
      <table>
        <thead>
          <tr>
            <th>Verkaufsstelle</th>
            <th>System</th>
            <th>Du kaufst</th>
            <th>Station zahlt</th>
            <th>Gewinn / SCU</th>
            <th>Marge</th>
            <th>Hinweise</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr>
            <td colspan="7" class="empty">Noch keine Route gewaehlt.</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="results-wrap is-hidden" id="shoppingResults">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Bereich</th>
            <th>Kategorie</th>
            <th>Shops</th>
          </tr>
        </thead>
        <tbody id="shoppingBody">
          <tr>
            <td colspan="4" class="empty">Noch keine Suche.</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="shopping-items.js"></script>
  <script src="shopping-prices.js"></script>
  <script src="script.js"></script>
</body>
</html>
